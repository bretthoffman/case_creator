# =============================================================================
# CASE CREATOR — BUSINESS RULES (single-file edit surface)
# =============================================================================
#
# SAVE THIS FILE AND RESTART THE APP for changes to take effect.
#
# --- For humans ---
# This file under business_rules/v1/ is the canonical human-edited unified rules file in the repo.
# Source/dev runs load it directly. Do not edit business_rules_seed/v1/case_creator_rules.yaml by
# hand — that path is the packaged default seed, kept identical by sync/build (see README in this folder).
# Packaged apps seed %LOCALAPPDATA%/CaseCreator/business_rules/v1/case_creator_rules.yaml from the
# bundled copy on first run; edit that external file after install (see README).
# If this file is missing or invalid in dev, the app uses built-in schema defaults (not silent live rules).
# An archival copy of the old per-family YAMLs lives under:
#   business_rules/archive/v1_split_backup/
# (read-only reference; not loaded at runtime).
#
# --- For ChatGPT / other LLMs ---
# You may copy the ENTIRE file (including comments) into a chat when asking for edits.
# The assistant should:
#   1. Ask clarifying questions if the request is ambiguous or unsafe.
#   2. Return the COMPLETE updated file in one fenced code block (full YAML), not a fragment.
#   3. Preserve unrelated sections, keys, and comments unless the user asked to change them.
#   4. NOT invent keys: only these top-level keys are allowed:
#        unified_version (required, integer 1)
#        enabled (optional boolean envelope metadata)
#        doctor_overrides, shade_overrides, routing_overrides, argen_modes
#   5. Keep each family subtree schema-valid (same rules as the old per-family YAML files).
#   6. Prefer minimal formatting churn when possible.
#
# Schema reference: infrastructure/config/business_rule_schemas.py
# =============================================================================

unified_version: 1
doctor_overrides:
  version: 1
  enabled: true
  rules:
  - id: abby_dew_multi_outcome
    enabled: true
    match:
      predicate: abby_dew
    when:
      all:
      - field: has_study
        eq: false
      - field: signature
        eq: false
      - field: is_anterior
        eq: false
      - excludes_modeless_hint_route: true
    outcomes:
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: false
        - scanner_is_itero: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: false
        - scanner_is_itero: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_adzir_model
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_envision_model
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: false
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: false
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: false
        - non_argen_shade: false
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: false
        - non_argen_shade: false
      action:
        template_override_key: ai_envision
  - id: vd_brier_creek_multi_outcome
    enabled: true
    match:
      predicate: vd_brier_creek
    when:
      all:
      - field: has_study
        eq: false
      - field: signature
        eq: false
      - field: is_anterior
        eq: false
      - excludes_modeless_hint_route: true
    outcomes:
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - scanner_is_itero: false
      action:
        template_override_key: ai_adzir_model
    - when:
        all:
        - material_is_adz: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_envision_model
  - id: example_single_key_doctor
    enabled: false
    match:
      contains_all:
      - sample
      - doctor
    action:
      template_override_key: ai_envision
shade_overrides:
  version: 1
  enabled: true
  non_argen_shade_markers:
  - C3
  - A4
  rules: []
routing_overrides:
  version: 1
  enabled: true
  template_family_route_overrides:
  - family_key: argen
    destination_key: argen
  - family_key: study
    destination_key: '1_9'
  - family_key: anterior
    destination_key: '1_9'
  - family_key: ai
    destination_key: '1_9'
argen_modes:
  version: 1
  enabled: true
  contact_model_mode: 'off'
