# Windows packaged build (PyInstaller one-folder). Uploads zip workflow artifact only.
# Does not publish GitHub Releases or run any updater logic.
name: Build Windows package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 pyinstaller

      - name: Package app (PyInstaller one-folder)
        shell: cmd
        run: call scripts\windows\build_pyside6_onefolder.bat

      - name: Validate build output
        run: |
          $dist = Join-Path $PWD "dist\CaseCreator"
          if (-not (Test-Path $dist)) {
            throw "Expected dist\CaseCreator folder missing."
          }
          $exe = Join-Path $dist "CaseCreator.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected CaseCreator.exe missing under dist\CaseCreator."
          }
          $seed = Get-ChildItem -Path $dist -Recurse -File -Filter "case_creator_rules.yaml" |
            Where-Object { $_.FullName -match '[\\/]business_rules_seed[\\/]v1[\\/]case_creator_rules\.yaml$' }
          if (-not $seed) {
            throw "Bundled unified seed not found under dist\CaseCreator (expected **/business_rules_seed/v1/case_creator_rules.yaml)."
          }
          Write-Host "OK: exe and bundled seed present."

      - name: Set zip filename
        run: |
          $ref = $env:GITHUB_REF
          if ($ref -match '^refs/tags/v') {
            $tag = $ref -replace '^refs/tags/', ''
            "ZIP_NAME=CaseCreator-$tag-win64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "ZIP_NAME=CaseCreator-win64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Zip packaged folder
        run: |
          $zip = Join-Path $PWD $env:ZIP_NAME
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\CaseCreator" -DestinationPath $zip
          Get-Item $zip | Format-List FullName, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaseCreator-win64
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
