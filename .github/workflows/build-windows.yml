# Windows packaged build (PyInstaller one-folder). Uploads zip workflow artifact only.
# Does not publish GitHub Releases or run any updater logic.
name: Build Windows package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PySide6 pyinstaller

      # PyInstaller rejects the PyPI 'pathlib' backport; remove if present (direct or transitive).
      - name: Uninstall obsolete pip pathlib backport
        run: python -m pip uninstall -y pathlib

      - name: Verify pip pathlib package is absent
        run: |
          # pip exits 1 when the distribution is missing; GitHub Actions would otherwise
          # treat that native exit code as step failure unless we end with exit 0.
          python -m pip show pathlib 2>$null | Out-Null
          $pipExit = $LASTEXITCODE
          if ($pipExit -eq 0) {
            throw "pip package 'pathlib' is still installed; PyInstaller will fail. Remove it from requirements or dependencies."
          }
          Write-Host "OK: pip does not report a 'pathlib' distribution (pip show exit code $pipExit)."
          exit 0

      # Bundled as app_version.txt (see scripts/windows/build_pyside6_onefolder.bat --add-data).
      # Store without a leading "v" so UI prefixes a single "v" (e.g. tag v0.0.3-base -> file 0.0.3-base).
      - name: Write app_version.txt for packaged build
        run: |
          $ref = $env:GITHUB_REF
          if ($ref -match '^refs/tags/(.+)$') {
            $tag = $Matches[1].Trim()
            if ($tag.StartsWith('v') -or $tag.StartsWith('V')) {
              $ver = $tag.Substring(1)
            } else {
              $ver = $tag
            }
          } else {
            $ver = "0.0.0-ci"
          }
          Set-Content -Path "app_version.txt" -Value $ver -NoNewline -Encoding utf8
          Write-Host "app_version.txt -> '$ver' (from ref $ref)"

      - name: Package app (PyInstaller one-folder)
        shell: cmd
        run: call scripts\windows\build_pyside6_onefolder.bat

      - name: Validate build output
        run: |
          $dist = Join-Path $PWD "dist\CaseCreator"
          if (-not (Test-Path $dist)) {
            throw "Expected dist\CaseCreator folder missing."
          }
          $exe = Join-Path $dist "CaseCreator.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected CaseCreator.exe missing under dist\CaseCreator."
          }
          $seed = Get-ChildItem -Path $dist -Recurse -File -Filter "case_creator_rules.yaml" |
            Where-Object { $_.FullName -match '[\\/]business_rules_seed[\\/]v1[\\/]case_creator_rules\.yaml$' }
          if (-not $seed) {
            throw "Bundled unified seed not found under dist\CaseCreator (expected **/business_rules_seed/v1/case_creator_rules.yaml)."
          }
          $internal = Join-Path $dist "_internal"
          $av = Join-Path $internal "app_version.txt"
          if (-not (Test-Path $av)) {
            throw "Expected app_version.txt missing under dist\CaseCreator\_internal (PyInstaller data root)."
          }
          Write-Host "OK: app_version.txt present:" (Get-Content -Raw $av).Trim()
          Write-Host "OK: exe, seed, and version file present."

      - name: Set zip filename
        run: |
          $ref = $env:GITHUB_REF
          if ($ref -match '^refs/tags/v') {
            $tag = $ref -replace '^refs/tags/', ''
            "ZIP_NAME=CaseCreator-$tag-win64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "ZIP_NAME=CaseCreator-win64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Zip packaged folder
        run: |
          $zip = Join-Path $PWD $env:ZIP_NAME
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\CaseCreator" -DestinationPath $zip
          Get-Item $zip | Format-List FullName, Length

      - name: Generate SHA256 checksum (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $zip = Join-Path $PWD $env:ZIP_NAME
          $hash = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          $line = "$hash  $env:ZIP_NAME"
          $shaPath = "$zip.sha256"
          $line | Out-File -FilePath $shaPath -Encoding ascii
          Get-Item $shaPath | Format-List FullName, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: CaseCreator-win64
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Upload release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          fail_on_unmatched_files: true
