# Test fixture — mirrors business_rules/v1/case_creator_rules.yaml logical content.
# Regenerate when the seeded unified file changes.

unified_version: 1
doctor_overrides:
  version: 1
  enabled: true
  rules:
  - id: abby_dew_multi_outcome
    enabled: true
    match:
      predicate: abby_dew
    when:
      all:
      - field: has_study
        eq: false
      - field: signature
        eq: false
      - field: is_anterior
        eq: false
      - excludes_modeless_hint_route: true
    outcomes:
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: false
        - scanner_is_itero: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: false
        - scanner_is_itero: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_adzir_model
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_envision_model
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: false
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: false
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: false
        - non_argen_shade: false
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: false
        - non_argen_shade: false
      action:
        template_override_key: ai_envision
  - id: vd_brier_creek_multi_outcome
    enabled: true
    match:
      predicate: vd_brier_creek
    when:
      all:
      - field: has_study
        eq: false
      - field: signature
        eq: false
      - field: is_anterior
        eq: false
      - excludes_modeless_hint_route: true
    outcomes:
    - when:
        all:
        - material_is_adz: true
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_adzir
    - when:
        all:
        - material_is_adz: false
        - field: shade_usable
          eq: true
        - scanner_is_itero: true
        - non_argen_shade: true
      action:
        template_override_key: ai_envision
    - when:
        all:
        - material_is_adz: true
        - scanner_is_itero: false
      action:
        template_override_key: ai_adzir_model
    - when:
        all:
        - material_is_adz: false
        - scanner_is_itero: false
      action:
        template_override_key: ai_envision_model
  - id: example_single_key_doctor
    enabled: false
    match:
      contains_all:
      - sample
      - doctor
    action:
      template_override_key: ai_envision
shade_overrides:
  version: 1
  enabled: true
  non_argen_shade_markers:
  - C3
  - A4
  rules: []
routing_overrides:
  version: 1
  enabled: true
  template_family_route_overrides:
  - family_key: argen
    destination_key: argen
  - family_key: study
    destination_key: '1_9'
  - family_key: anterior
    destination_key: '1_9'
  - family_key: ai
    destination_key: '1_9'
argen_modes:
  version: 1
  enabled: true
  contact_model_mode: 'off'
  contact_model_design_field: 3Shape Automate
